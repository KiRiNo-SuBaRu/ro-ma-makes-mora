<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>SuBaRu-Ro-Ma-Mora-Marker debug moraN v1.1.0-r2</title>
  <style>
    body { font-family: monospace; padding: 1em; }
    #result { font-size: 2em; margin: 0.5em 0; letter-spacing: 0.05em; }
    #log { white-space: pre; font-size: 0.85em; background: #f5f5f5;
      padding: 0.8em; border: 1px solid #ccc; margin-top: 1em; }
    table { border-collapse: collapse; margin-top: 1em; width: 100%; }
    th, td { border: 1px solid #bbb; padding: 0.3em 0.6em; text-align: left; }
    th { background: #eee; }
    .chip { display: inline-block; margin: 0.2em; padding: 0.2em 0.5em;
      background: #ddf; border-radius: 4px; cursor: pointer; }
  </style>
</head>
<body>
<h2>SuBaRu-Ro-Ma-Mora-Marker debug v1.1.0-r2</h2>

<textarea id="inp" rows="3" cols="40"
  placeholder="例: gakkou kitte toukyou"></textarea><br>
<button onclick="run()">変換</button>

<div id="result"></div>
<pre id="log"></pre>

<h3>固定テスト（回帰テストセット）</h3>
<div id="chips"></div>
<table id="tbl">
  <thead>
    <tr>
      <th>input</th><th>tokens</th><th>moras</th><th>output</th>
      <th>expect</th><th>pass?</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>

<script>
/* =====================================================
 * tokenizeJP
 * CV / CyV / V / N / Q / C? に分割する軽量トークナイザ
 * ===================================================== */
function tokenizeJP(word) {
  const s = word.toLowerCase();
  const tokens = [];
  let i = 0;
  while (i < s.length) {
    // CyV: 子音 + y + 母音
    if (
      i + 2 < s.length &&
      /[bcdfghjklmnpqrstvwxz]/.test(s[i]) &&
      s[i + 1] === 'y' &&
      /[aeiou]/.test(s[i + 2])
    ) {
      tokens.push({ kind: 'CyV', raw: s.slice(i, i + 3) });
      i += 3;
      continue;
    }
    // CV: 子音 + 母音（sh/ch/ts など2文字子音を含む）
    if (
      i + 1 < s.length &&
      /[bcdfghjklmnpqrstvwxz]/.test(s[i]) &&
      /[aeiou]/.test(s[i + 1])
    ) {
      tokens.push({ kind: 'CV', raw: s.slice(i, i + 2) });
      i += 2;
      continue;
    }
    // V: 母音単独
    if (/[aeiou]/.test(s[i])) {
      tokens.push({ kind: 'V', raw: s[i] });
      i++;
      continue;
    }
    // N: 撥音（語末 or 子音前の n）
    if (
      s[i] === 'n' &&
      (i + 1 >= s.length || /[bcdfghjklmpqrstvwxz]/.test(s[i + 1]))
    ) {
      tokens.push({ kind: 'N', raw: 'n' });
      i++;
      continue;
    }
    // Q: 促音（同じ子音が連続する先頭）
    if (
      /[bcdfghjklmpqrstvwxz]/.test(s[i]) &&
      i + 1 < s.length &&
      s[i + 1] === s[i]
    ) {
      tokens.push({ kind: 'Q', raw: s[i] });
      i++;
      continue;
    }
    // C?: 未解析子音（フォールバック）
    tokens.push({ kind: 'C?', raw: s[i] });
    i++;
  }
  return tokens;
}

/* =====================================================
 * buildMoras
 * Q + CV -> QCV / Q + CyV -> QCyV に結合。
 * それ以外は 1トークン = 1モーラ。
 * ===================================================== */
function buildMoras(tokens) {
  const moras = [];
  let i = 0;
  while (i < tokens.length) {
    const t = tokens[i];
    if (t.kind === 'Q') {
      const next = tokens[i + 1];
      if (next && next.kind === 'CV') {
        moras.push({ kind: 'QCV', raw: t.raw + next.raw });
        i += 2;
        continue;
      }
      if (next && next.kind === 'CyV') {
        moras.push({ kind: 'QCyV', raw: t.raw + next.raw });
        i += 2;
        continue;
      }
    }
    moras.push({ kind: t.kind, raw: t.raw });
    i++;
  }
  return moras;
}

/* =====================================================
 * displayMoras
 * モーラ種別ごとに SuBaRu 風強調表示。
 * V モーラは例外ルールを順評価し、デフォルトは
 * 「語末なら大文字、語中なら小文字」。
 * ===================================================== */
function displayMoras(moras) {
  let out = '';
  for (let idx = 0; idx < moras.length; idx++) {
    const m    = moras[idx];
    const prev = idx > 0 ? moras[idx - 1] : null;
    const next = idx < moras.length - 1 ? moras[idx + 1] : null;
    const isLast = idx === moras.length - 1;
    const mv = m.raw;

    switch (m.kind) {
      case 'CV':
        // 子音大文字 + 母音小文字
        out += mv[0].toUpperCase() + mv.slice(1).toLowerCase();
        break;

      case 'CyV':
        // 先頭子音だけ大文字
        out += mv[0].toUpperCase() + mv.slice(1).toLowerCase();
        break;

      case 'QCV':
        // 先頭（促音子音）小文字 + 2文字目（CV子音）大文字 + 母音小文字
        out += mv[0].toLowerCase()
          + mv[1].toUpperCase()
          + mv.slice(2).toLowerCase();
        break;

      case 'QCyV':
        // 先頭小文字 + 2文字目大文字 + 残り小文字
        out += mv[0].toLowerCase()
          + mv[1].toUpperCase()
          + mv.slice(2).toLowerCase();
        break;

      case 'N':
        out += 'N';
        break;

      case 'V': {
        // --- 例外ルール（引き継ぎ仕様の実装順に評価） ---

        // 1. kitteiru 用: QCV:tte の直後の i で次が CV:ru
        if (
          mv === 'i' &&
          prev && prev.kind === 'QCV' && prev.raw === 'tte' &&
          next && next.kind === 'CV'  && next.raw === 'ru'
        ) {
          out += 'I'; break;
        }
        // 2. seisyohou 用: CV:se の直後の i
        if (
          mv === 'i' &&
          prev && prev.kind === 'CV' && prev.raw === 'se'
        ) {
          out += 'I'; break;
        }
        // 3. suu 用: CV:su の直後の u -> 語末でも小文字
        if (
          mv === 'u' &&
          prev && prev.kind === 'CV' && prev.raw === 'su'
        ) {
          out += 'u'; break;
        }
        // 4. toukyou 用: CV:to の直後の u で次が CyV:kyo
        if (
          mv === 'u' &&
          prev && prev.kind === 'CV'  && prev.raw === 'to' &&
          next && next.kind === 'CyV' && next.raw === 'kyo'
        ) {
          out += 'U'; break;
        }
        // 5. siteori 用: CV:te の直後の o
        if (
          mv === 'o' &&
          prev && prev.kind === 'CV' && prev.raw === 'te'
        ) {
          out += 'O'; break;
        }
        // 6. osaete 用: 語頭の o / CV:sa 直後の e
        if (mv === 'o' && !prev) {
          out += 'O'; break;
        }
        if (
          mv === 'e' &&
          prev && prev.kind === 'CV' && prev.raw === 'sa'
        ) {
          out += 'E'; break;
        }
        // 7. デフォルト: 語末なら大文字、語中なら小文字
        out += isLast ? mv.toUpperCase() : mv.toLowerCase();
        break;
      }

      default:
        out += mv;
    }
  }
  return out;
}

/* =====================================================
 * classifyWord（簡易）
 * 小文字ローマ字のみで構成されていれば JP_ROMAJI
 * ===================================================== */
function classifyWord(word) {
  if (/^[a-z']+$/.test(word.toLowerCase())) return 'JP_ROMAJI';
  return 'UNKNOWN';
}

/* =====================================================
 * convertWord
 * ===================================================== */
function convertWord(word) {
  const lower = word.toLowerCase();
  const type  = classifyWord(lower);

  if (type !== 'JP_ROMAJI') {
    return { type, tokens: [], moras: [], result: word };
  }

  // 個別例外: oi
  if (lower === 'oi') {
    const tokens = tokenizeJP(lower);
    const moras  = buildMoras(tokens);
    return { type, tokens, moras, result: 'Oi' };
  }

  const tokens = tokenizeJP(lower);
  const moras  = buildMoras(tokens);
  const result = displayMoras(moras);
  return { type, tokens, moras, result };
}

/* =====================================================
 * splitWords: スペース・記号で分割し単語単位に処理
 * ===================================================== */
function splitWords(text) {
  return text.split(/(\s+)/);
}

/* =====================================================
 * convertText: テキスト全体を変換
 * ===================================================== */
function convertText(text) {
  const parts   = splitWords(text);
  const logLines = [];
  let output = '';

  for (const part of parts) {
    if (/^\s+$/.test(part)) {
      output += part;
      continue;
    }
    const r = convertWord(part);
    output += r.result;
    if (r.type === 'JP_ROMAJI') {
      const tStr = r.tokens.map(t => `${t.kind}:${t.raw}`).join(' | ');
      const mStr = r.moras.map(m  => `${m.kind}:${m.raw}`).join(' | ');
      logLines.push(
        `[${part}]\n  tokens: ${tStr}\n  moras : ${mStr}\n  output: ${r.result}`
      );
    }
  }
  return { output, logLines };
}

/* =====================================================
 * run: UI 処理
 * ===================================================== */
function run() {
  const text = document.getElementById('inp').value.trim();
  const { output, logLines } = convertText(text);
  document.getElementById('result').textContent = output;
  document.getElementById('log').textContent = logLines.join('\n---\n');
}

/* =====================================================
 * 回帰テストセット
 * ===================================================== */
const REGRESSION = [
  { input: 'gakkou',    expect: 'GakKoU'    },
  { input: 'toppu',     expect: 'TopPu'     },
  { input: 'kitte',     expect: 'KitTe'     },
  { input: 'kitteiru',  expect: 'KitTeIRu'  },
  { input: 'suu',       expect: 'Suu'       },
  { input: 'oi',        expect: 'Oi'        },
  { input: 'tou',       expect: 'ToU'       },
  { input: 'toukyou',   expect: 'ToUKyoU'   },
  { input: 'yasai',     expect: 'YaSaI'     },
  { input: 'seisyohou', expect: 'SeISyoHoU' },
  { input: 'siteori',   expect: 'SiTeORi'   },
  { input: 'osaete',    expect: 'OSaETe'    },
];

/* チップ生成 */
const chipsEl = document.getElementById('chips');
REGRESSION.forEach(tc => {
  const span = document.createElement('span');
  span.className = 'chip';
  span.textContent = tc.input;
  span.onclick = () => {
    document.getElementById('inp').value = tc.input;
    run();
  };
  chipsEl.appendChild(span);
});

/* テーブル生成 */
const tbody = document.getElementById('tbody');
REGRESSION.forEach(tc => {
  const r   = convertWord(tc.input);
  const tok = r.tokens.map(t => `${t.kind}:${t.raw}`).join(' | ');
  const mor = r.moras.map(m  => `${m.kind}:${m.raw}`).join(' | ');
  const pass = r.result === tc.expect;
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td>${tc.input}</td>
    <td>${tok}</td>
    <td>${mor}</td>
    <td><strong>${r.result}</strong></td>
    <td>${tc.expect}</td>
    <td style="color:${pass ? 'green' : 'red'}">${pass ? '✓' : '✗'}</td>
  `;
  tbody.appendChild(tr);
});
</script>
</body>
</html>
