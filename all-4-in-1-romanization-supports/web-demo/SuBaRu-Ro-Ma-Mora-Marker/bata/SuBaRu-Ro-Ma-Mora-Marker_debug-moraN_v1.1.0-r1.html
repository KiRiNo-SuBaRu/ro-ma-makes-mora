<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>SuBaRu-Ro-Ma-Mora-Marker Web Demo</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        sans-serif;
      line-height: 1.5;
      margin: 1rem;
    }
    textarea {
      width: 100%;
      height: 8rem;
    }
    #result {
      font-size: 1.4rem;
      margin-top: 0.5rem;
      white-space: pre-wrap;
    }
    #log {
      font-family: "SF Mono", Menlo, Monaco, Consolas, "Liberation Mono",
        "Courier New", monospace;
      font-size: 0.8rem;
      margin-top: 1rem;
      white-space: pre-wrap;
      border-top: 1px solid #ccc;
      padding-top: 0.5rem;
    }
    #preset-testsets button {
      margin: 0.1rem 0.3rem 0.1rem 0;
      padding: 0.2rem 0.5rem;
      font-size: 0.8rem;
    }
    #config-panel {
      margin: 0.5rem 0 0.5rem;
      font-size: 0.85rem;
    }
    #config-panel input[type="number"] {
      width: 5rem;
      margin-left: 0.5rem;
      margin-right: 0.5rem;
    }
    #max-length-help {
      color: #666;
      font-size: 0.75rem;
      margin-left: 0.5rem;
    }
  </style>
</head>
<body>
  <h1>SuBaRu-Ro-Ma-Mora-Marker Web Demo</h1>

  <!-- 設定パネル: 長大語閾値 -->
  <div id="config-panel">
    <label for="max-length-input">
      強調対象とする 1 語あたりの最大文字数:
    </label>
    <input
      id="max-length-input"
      type="number"
      min="1"
      max="200"
      value="32"
    />
    <span id="max-length-help">
      1〜200 の整数。それ以外は 32 に戻ります。
    </span>
  </div>

  <!-- 代表セットボタン -->
  <div id="preset-testsets">
    <button data-testset="Q 基本セット">Q 基本セット</button>
    <button data-testset="長音・eo/ae セット">長音・eo/ae セット</button>
    <button data-testset="ny 代表セット">ny 代表セット</button>
    <button data-testset="ny 監視セット">ny 監視セット</button>
    <button data-testset="長大語テストセット">長大語テストセット</button>
    <button data-testset="N 表示テストセット">N 表示テストセット</button>
    <button data-testset="全代表語まとめセット">全代表語まとめセット</button>
  </div>

  <!-- 入力／出力 -->
  <textarea id="input" placeholder="ここにテキストを入力"></textarea>
  <div id="result"></div>
  <pre id="log"></pre>

  <script>
    // ===== 設定値・正規化 =====

    const defaultMaxLength = 32;
    const MIN_LENGTH = 1;
    const MAX_LENGTH = 200;

    const settings = {
      maxLength: defaultMaxLength
    };

    function normalizeMaxLength(value) {
      const n = Number(value);

      if (
        !Number.isFinite(n) ||
        !Number.isInteger(n) ||
        n < MIN_LENGTH ||
        n > MAX_LENGTH
      ) {
        return defaultMaxLength;
      }
      return n;
    }

    // ===== 代表テストセット =====

    const testSets = {
      "Q 基本セット": [
        "gakkou",
        "toppu",
        "kitte",
        "kitteiru"
      ],
      "長音・eo/ae セット": [
        "suu",
        "oi",
        "tou",
        "toukyou",
        "yasai",
        "seisyohou",
        "siteori",
        "osaete",
        "sieawo",
        "seion"
      ],
      "ny 代表セット": [
        "sinya",
        "kinyoubi"
      ],
      "ny 監視セット": [
        "nyanko",
        "nyuugaku",
        "nyoro",
        "ginyaku"
      ],
      "長大語テストセット": [
        "gakkou",
        "aaaaaaaaaabbbbbbbbbbccccccccccddd"
      ],
      "N 表示テストセット": [
        "seion",
        "kan",
        "hon",
        "minna",
        "ginkou"
      ]
    };

    function buildAllRepresentativeSetLines() {
      return [
        testSets["Q 基本セット"].join(" "),
        testSets["長音・eo/ae セット"].join(" "),
        testSets["ny 代表セット"].join(" "),
        testSets["ny 監視セット"].join(" "),
        testSets["長大語テストセット"].join(" "),
        testSets["N 表示テストセット"].join(" ")
      ];
    }

    // ===== 簡易トークナイザ／モーラ構築（ダミー版） =====
    // ※ここは実際のプロジェクトの tokenizeJP / buildMoras に差し替えて下さい。

    function tokenizeJP(word) {
      // 超簡易: 暫定で 1 文字ずつ V or その他 に分けるダミー
      const vowels = ["a", "i", "u", "e", "o"];
      const tokens = [];
      for (let i = 0; i < word.length; i++) {
        const ch = word[i];
        if (vowels.includes(ch)) {
          tokens.push({ kind: "V", raw: ch });
        } else if (ch === "n") {
          tokens.push({ kind: "N", raw: "n" });
        } else {
          tokens.push({ kind: "CV", raw: ch });
        }
      }
      return tokens;
    }

    function buildMoras(tokens) {
      // このデモでは tokenizeJP と同じ構造をそのまま使う
      return tokens.slice();
    }

    // ===== displayMoras: 仕様反映版（V 例外＋N→'n） =====

    function displayMoras(moras) {
      return moras.map((m, i) => {
        const raw  = m.raw.toLowerCase();
        const prev = moras[i - 1];
        const next = moras[i + 1];

        if (m.kind === "CV") {
          return raw[0].toUpperCase() + raw.slice(1);
        }

        if (m.kind === "QCV") {
          // 促音系は本デモでは割愛
          return raw;
        }

        if (m.kind === "CyV") {
          // 拗音系も本デモでは割愛
          return raw[0].toUpperCase() + raw.slice(1);
        }

        if (m.kind === "V") {
          const mv = raw;

          // ここに kitteiru / seisyohou / suu / toukyou /
          // siteori / osaete / sieawo の V 例外を追加
          // （実プロジェクトの実装をそのまま貼り付け推奨）

          const isLast = (i === moras.length - 1);
          return isLast ? mv.toUpperCase() : mv;
        }

        if (m.kind === "N") {
          // N モーラ表示: 常に 'n
          return "'n";
        }

        return raw;
      }).join("");
    }

    // ===== classifyWord: 簡易版 =====

    function classifyWord(lower) {
      // 超簡易: 英字のみ → JP_ROMAJI とみなす
      if (/^[a-z]+$/.test(lower)) return "JP_ROMAJI";
      return "UNKNOWN";
    }

    // ===== convertWord / convertText =====

    const wordLevelOverrides = {
      oi:       "Oi",
      sinya:    "SinYa",
      kinyoubi: "KinYoUBi"
    };

    function convertWord(word) {
      const raw   = word || "";
      const lower = raw.toLowerCase();
      const type  = classifyWord(lower);

      if (type !== "JP_ROMAJI") {
        return { type, tokens: [], moras: [], result: raw };
      }

      if (lower.length >= settings.maxLength) {
        return { type, tokens: [], moras: [], result: raw };
      }

      const tokens = tokenizeJP(lower);
      const moras  = buildMoras(tokens);

      if (wordLevelOverrides[lower]) {
        return { type, tokens, moras, result: wordLevelOverrides[lower] };
      }

      return {
        type,
        tokens,
        moras,
        result: displayMoras(moras)
      };
    }

    function splitWords(text) {
      return text
        .split(/\s+/)
        .map((w) => w.trim())
        .filter((w) => w.length > 0);
    }

    function convertText(text) {
      const words = splitWords(text);
      const results = [];
      const logLines = [];

      for (const w of words) {
        const r = convertWord(w);
        results.push(r.result);

        logLines.push(
          `word: ${w}\n` +
          `  type:   ${r.type}\n` +
          `  tokens: ${JSON.stringify(r.tokens)}\n` +
          `  moras:  ${JSON.stringify(r.moras)}\n` +
          `  result: ${r.result}\n`
        );
      }

      document.getElementById("log").textContent = logLines.join("\n");
      return results.join(" ");
    }

    function convertAndRender() {
      const inputEl  = document.getElementById("input");
      const resultEl = document.getElementById("result");
      if (!inputEl || !resultEl) return;

      const text   = inputEl.value || "";
      const output = convertText(text);

      resultEl.textContent = output;
    }

    // ===== UI 初期化 =====

    function initConfigPanel() {
      const input = document.getElementById("max-length-input");
      if (!input) return;

      settings.maxLength = defaultMaxLength;
      input.value = String(defaultMaxLength);

      input.addEventListener("input", () => {
        const normalized = normalizeMaxLength(input.value);
        input.value = String(normalized);
        settings.maxLength = normalized;
      });
    }

    function initTestsetButtons() {
      const container = document.getElementById("preset-testsets");
      if (!container) return;

      const inputEl = document.getElementById("input");
      if (!inputEl) return;

      container.addEventListener("click", (ev) => {
        const btn = ev.target.closest("button[data-testset]");
        if (!btn) return;

        const name = btn.getAttribute("data-testset");
        let text = "";

        if (name === "全代表語まとめセット") {
          const lines = buildAllRepresentativeSetLines();
          text = lines.join("\n");
        } else {
          const words = testSets[name];
          if (!words || !words.length) return;
          text = words.join(" ");
        }

        inputEl.value = text;
        convertAndRender();
      });
    }

    document.addEventListener("DOMContentLoaded", () => {
      initConfigPanel();
      initTestsetButtons();

      const inputEl = document.getElementById("input");
      if (inputEl) {
        inputEl.addEventListener("input", convertAndRender);
      }
    });
  </script>
</body>
</html>
