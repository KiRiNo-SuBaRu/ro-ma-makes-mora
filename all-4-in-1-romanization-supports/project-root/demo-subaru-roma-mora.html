<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Subaru Roma Mora Demo</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f7f7;
      --fg: #222;
      --muted: #666;
      --line: #ccc;
      --panel: #fff;
      --accent: #0b6cff;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #151515;
        --fg: #f2f2f2;
        --muted: #aaa;
        --line: #444;
        --panel: #202020;
        --accent: #78a9ff;
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.5;
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 1.8rem;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 1.15rem;
    }

    p {
      margin: 0 0 12px;
      color: var(--muted);
    }

    .grid {
      display: grid;
      gap: 16px;
      grid-template-columns: 1fr;
    }

    @media (min-width: 900px) {
      .grid {
        grid-template-columns: 1.2fr 0.8fr;
      }
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 16px;
    }

    .stack {
      display: grid;
      gap: 12px;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
    }

    textarea,
    input,
    button,
    pre {
      font: inherit;
    }

    textarea,
    input[type="text"],
    input[type="number"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      background: transparent;
      color: inherit;
    }

    textarea {
      min-height: 140px;
      resize: vertical;
    }

    .row {
      display: grid;
      gap: 12px;
      grid-template-columns: 1fr;
    }

    @media (min-width: 640px) {
      .row {
        grid-template-columns: 1fr 180px;
      }
    }

    .button-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      border: 1px solid var(--accent);
      background: var(--accent);
      color: white;
      border-radius: 8px;
      padding: 10px 14px;
      cursor: pointer;
    }

    button.secondary {
      background: transparent;
      color: var(--fg);
      border-color: var(--line);
    }

    .summary {
      padding: 10px 12px;
      border: 1px dashed var(--line);
      border-radius: 8px;
      color: var(--muted);
      white-space: pre-wrap;
    }

    pre {
      margin: 0;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: auto;
      background: rgba(127, 127, 127, 0.08);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .mini {
      font-size: 0.92rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main>
    <h1>すばる式ローマ字モーラ強調装飾 v3.x デモ</h1>
    <p>
      文章全体の変換と、単語単位の debug 解析を同時に確認する最小 UI です。
    </p>

    <div class="grid">
      <section class="panel stack">
        <div>
          <h2>全文変換</h2>
          <p class="mini">
            入力文全体を convertText で変換します。
          </p>
        </div>

        <div>
          <label for="inputText">入力テキスト</label>
          <textarea id="inputText">Sumutokoro Nippon ToU</textarea>
        </div>

        <div class="row">
          <div>
            <label for="maxLength">最大長</label>
            <input
              id="maxLength"
              type="number"
              min="1"
              max="200"
              value="32"
            >
          </div>
          <div>
            <label for="debugWord">単語デバッグ入力</label>
            <input
              id="debugWord"
              type="text"
              value="Nippon"
            >
          </div>
        </div>

        <div class="button-row">
          <button id="runConvert" type="button">全文変換</button>
          <button id="runAnalyze" type="button" class="secondary">
            単語解析
          </button>
        </div>

        <div>
          <label for="outputText">変換結果</label>
          <pre id="outputText"></pre>
        </div>
      </section>

      <section class="panel stack">
        <div>
          <h2>単語解析</h2>
          <p class="mini">
            analyzeWord の返却 JSON を表示します。
          </p>
        </div>

        <div>
          <label for="debugSummary">要約</label>
          <div id="debugSummary" class="summary"></div>
        </div>

        <div>
          <label for="debugJson">詳細 JSON</label>
          <pre id="debugJson"></pre>
        </div>
      </section>
    </div>
  </main>

  <script src="./core-2.js"></script>
  <script>
    const {
      settings,
      normalizeMaxLength,
      analyzeWord,
      convertText
    } = window.SubaruRomaMora;

    const inputTextEl = document.getElementById('inputText');
    const debugWordEl = document.getElementById('debugWord');
    const maxLengthEl = document.getElementById('maxLength');
    const runConvertEl = document.getElementById('runConvert');
    const runAnalyzeEl = document.getElementById('runAnalyze');
    const outputTextEl = document.getElementById('outputText');
    const debugSummaryEl = document.getElementById('debugSummary');
    const debugJsonEl = document.getElementById('debugJson');

    function syncMaxLengthSetting() {
      const normalized = normalizeMaxLength(maxLengthEl.value);
      settings.maxLength = normalized;
      maxLengthEl.value = String(normalized);
      return normalized;
    }

    function renderConvert() {
      syncMaxLengthSetting();
      const input = inputTextEl.value || '';
      const output = convertText(input);
      outputTextEl.textContent = output;
    }

    function renderAnalyze() {
      syncMaxLengthSetting();
      const word = (debugWordEl.value || '').trim();

      if (!word) {
        debugSummaryEl.textContent = '';
        debugJsonEl.textContent = '';
        return;
      }

      const result = analyzeWord(word);

      debugSummaryEl.textContent = [
        `type=${result.type}`,
        `scope=${result.scope}`,
        `blockedByLength=${result.blockedByLength}`,
        `representativeMatched=${result.representativeMatched}`,
        `representativeKey=${result.representativeKey || '-'}`,
        `result=${result.result}`,
      ].join(' | ');

      debugJsonEl.textContent = JSON.stringify(result, null, 2);
    }

    runConvertEl.addEventListener('click', renderConvert);
    runAnalyzeEl.addEventListener('click', renderAnalyze);

    inputTextEl.addEventListener('input', renderConvert);
    debugWordEl.addEventListener('input', renderAnalyze);

    maxLengthEl.addEventListener('change', () => {
      renderConvert();
      renderAnalyze();
    });

    renderConvert();
    renderAnalyze();
  </script>
</body>
</html>
