<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SuBaRu-Ro-Ma-Mora-Marker debug minimal</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f6f4ef;
      --panel: #fffdfa;
      --line: #d8d2c8;
      --text: #22201b;
      --muted: #6b655d;
      --accent: #0f6d72;
      --bad: #9f2454;
      --good: #2d6a1f;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #181714;
        --panel: #22201d;
        --line: #423d37;
        --text: #ece7de;
        --muted: #aea79c;
        --accent: #6bc0c8;
        --bad: #f06aa6;
        --good: #9cd67d;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    .wrap {
      width: min(960px, calc(100% - 32px));
      margin: 24px auto 48px;
    }
    h1, h2 { margin: 0 0 12px; }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }
    textarea, input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px;
      background: transparent;
      color: var(--text);
      font: inherit;
    }
    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    button {
      border: 1px solid var(--line);
      background: var(--accent);
      color: white;
      border-radius: 10px;
      padding: 10px 14px;
      font: inherit;
      cursor: pointer;
    }
    button.sub {
      background: transparent;
      color: var(--text);
    }
    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 14px;
    }
    .muted { color: var(--muted); }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      border: 1px solid var(--line);
      background: transparent;
      border-radius: 999px;
      padding: 6px 10px;
      cursor: pointer;
      color: var(--text);
    }
    .ok { color: var(--good); }
    .ng { color: var(--bad); }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    th, td {
      border-top: 1px solid var(--line);
      padding: 8px;
      text-align: left;
      vertical-align: top;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="panel">
      <h1>SuBaRu-Ro-Ma-Mora-Marker debug minimal</h1>
      <p class="muted">単体HTMLで開ける最小デバッグ版です。入力、変換結果、簡易ログ、固定テストを確認できます。</p>
    </section>

    <section class="panel">
      <h2>入力</h2>
      <textarea id="input" rows="4">gakkou</textarea>
      <div class="row">
        <button id="run">変換</button>
        <button id="clear" class="sub">ログ消去</button>
      </div>
    </section>

    <section class="panel">
      <h2>結果</h2>
      <pre id="output"></pre>
    </section>

    <section class="panel">
      <h2>簡易ログ</h2>
      <pre id="log"></pre>
    </section>

    <section class="panel">
      <h2>固定テスト</h2>
      <div class="chips" id="cases"></div>
      <div class="row" style="margin-top:16px;">
        <button id="runTests" class="sub">一覧実行</button>
      </div>
      <div style="margin-top:12px; overflow:auto;">
        <table>
          <thead>
            <tr><th>入力</th><th>期待</th><th>実際</th><th>状態</th></tr>
          </thead>
          <tbody id="testBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    const testCases = [
      ["gakkou", "GakKoU"],
      ["gyoukai", "GyoUKaI"],
      ["gyo", "Gyo"],
      ["kaihatu", "KaIHaTu"],
      ["seisyohou", "SeISyoHoU"],
      ["yasai", "YaSaI"],
      ["siteori", "SiTeORi"],
      ["osaete", "OSaETe"],
      ["tou", "ToU"],
      ["toukyou", "ToUKyoU"],
      ["suu", "Suu"],
      ["oi", "Oi"],
      ["boat", "boat"],
      ["coat", "coat"],
      ["head", "head"],
      ["piano", "piano"]
    ];

    const vowels = new Set(["a", "i", "u", "e", "o"]);
    const latinWords = new Set(["boat", "coat", "head", "piano"]);
    const output = document.getElementById("output");
    const log = document.getElementById("log");
    const input = document.getElementById("input");
    const body = document.getElementById("testBody");
    const cases = document.getElementById("cases");

    function appendLog(line) {
      log.textContent += (log.textContent ? "\n" : "") + line;
    }

    function isVowel(ch) {
      return vowels.has(ch);
    }

    function splitWords(text) {
      return text.split(/(\s+)/).filter(v => v.length > 0);
    }

    function classifyWord(word) {
      const lower = word.toLowerCase();
      if (latinWords.has(lower)) return "LATIN_WORD";
      if (/[^a-z]/i.test(word)) return "UNKNOWN";
      if (/(oa|ea|ia)/.test(lower)) return "LATIN_WORD";
      if (/(tsu|shi|kyo|gyo|kyo|ryo|nya|nyo|hya|myo|byo|pyo|tou|kai|gak|syo)/.test(lower)) return "JP_ROMAJI";
      if (/[aeiou]/.test(lower)) return "JP_ROMAJI";
      return "UNKNOWN";
    }

    function tokenizeJP(word) {
      const s = word.toLowerCase();
      const tokens = [];
      let i = 0;
      while (i < s.length) {
        const c = s[i];
        const n = s[i + 1] || "";
        const nn = s[i + 2] || "";

        if (i + 1 < s.length && c === n && !isVowel(c) && c !== "n") {
          tokens.push({ type: "Q", raw: c });
          i += 1;
          continue;
        }

        if (c === "n") {
          if (!n) {
            tokens.push({ type: "N", raw: "n" });
            i += 1;
            continue;
          }
          if (n === "y") {
          } else if (!isVowel(n)) {
            tokens.push({ type: "N", raw: "n" });
            i += 1;
            continue;
          }
        }

        if (isVowel(c)) {
          tokens.push({ type: "V", raw: c });
          i += 1;
          continue;
        }

        if (n === "y" && isVowel(nn)) {
          tokens.push({ type: "CyV", raw: c + n + nn });
          i += 3;
          continue;
        }

        if (isVowel(n)) {
          tokens.push({ type: "CV", raw: c + n });
          i += 2;
          continue;
        }

        tokens.push({ type: "C?", raw: c });
        i += 1;
      }
      return tokens;
    }

    function basicDisplay(tokens) {
      const out = [];
      for (let i = 0; i < tokens.length; i += 1) {
        const t = tokens[i];
        const prev = tokens[i - 1];
        if (t.type === "Q") continue;
        if (t.type === "N") {
          out.push("N");
          continue;
        }
        if (t.type === "V") {
          const prevRaw = prev ? prev.raw : "";
          const raw = t.raw;
          const isLast = i === tokens.length - 1;
          if (raw === "u" && prevRaw === "su") {
            out.push("u");
            continue;
          }
          if (raw === "i" && prevRaw === "o") {
            out.push("i");
            continue;
          }
          if (raw === "u" || raw === "i" || raw === "e" || raw === "o" || raw === "a") {
            if (isLast || prev) out.push(raw.toUpperCase());
            else out.push(raw);
            continue;
          }
        }
        let raw = t.raw;
        if (prev && prev.type === "Q") raw = raw[0] + raw;
        out.push(raw[0].toUpperCase() + raw.slice(1));
      }
      return out.join("");
    }

    function convertWord(word) {
      const type = classifyWord(word);
      if (type !== "JP_ROMAJI") {
        return { type, tokens: [], result: word };
      }
      const tokens = tokenizeJP(word);
      const result = basicDisplay(tokens);
      return { type, tokens, result };
    }

    function convertText(text) {
      const parts = splitWords(text);
      const lines = [];
      const results = parts.map(part => {
        if (/^\s+$/.test(part)) return part;
        const info = convertWord(part);
        lines.push(`${part} => type=${info.type} tokens=${info.tokens.map(t => t.type + ':' + t.raw).join(',')} result=${info.result}`);
        return info.result;
      });
      return { text: results.join(""), logs: lines };
    }

    function runOne() {
      const res = convertText(input.value);
      output.textContent = res.text;
      appendLog(res.logs.join("\n"));
    }

    function renderCases() {
      testCases.forEach(([src]) => {
        const b = document.createElement("button");
        b.className = "chip";
        b.type = "button";
        b.textContent = src;
        b.addEventListener("click", () => {
          input.value = src;
          runOne();
        });
        cases.appendChild(b);
      });
    }

    function runTests() {
      body.innerHTML = "";
      testCases.forEach(([src, expected]) => {
        const actual = convertText(src).text;
        const tr = document.createElement("tr");
        const ok = actual === expected;
        tr.innerHTML = `<td>${src}</td><td>${expected}</td><td>${actual}</td><td class="${ok ? 'ok' : 'ng'}">${ok ? 'PASS' : 'FAIL'}</td>`;
        body.appendChild(tr);
      });
    }

    document.getElementById("run").addEventListener("click", runOne);
    document.getElementById("clear").addEventListener("click", () => { log.textContent = ""; });
    document.getElementById("runTests").addEventListener("click", runTests);
    renderCases();
    runOne();
  </script>
</body>
</html>
